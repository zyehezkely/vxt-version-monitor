name: Check VXT Version

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Find latest VXT version
        id: latest
        shell: bash
        run: |
          set -euo pipefail

          latest_version=$(curl -fs "https://storage.googleapis.com/vxt-app-desktop-versions?prefix=&delimiter=/" \
            | grep -oE '<Prefix>[0-9.]+/</Prefix>' \
            | sed -E 's#</?Prefix>##g; s#/$##' \
            | sort -V \
            | tail -1)

          if [[ -z "$latest_version" ]]; then
            echo "Could not determine latest version" >&2
            exit 1
          fi

          echo "latest_version=$latest_version" >> "$GITHUB_OUTPUT"

      - name: Read previous version
        id: previous
        shell: bash
        run: |
          if [[ -f latest_version.txt ]]; then
            previous_version=$(tr -d '\r\n' < latest_version.txt)
          else
            previous_version=""
          fi

          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

      - name: Get Title Editor token
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        id: token
        shell: bash
        run: |
          token=$(curl -fs --request POST \
            --url "${{ secrets.TITLE_EDITOR_URL }}/auth/token" \
            --header "Content-Type: application/json" \
            --data "{
              \"username\": \"${{ secrets.TITLE_EDITOR_USERNAME }}\",
              \"password\": \"${{ secrets.TITLE_EDITOR_PASSWORD }}\"
            }" | jq -r '.token')

          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "Failed to get Title Editor token" >&2
            exit 1
          fi

          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Create patch in Title Editor
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        shell: bash
        run: |
          today=$(date -u +"%Y-%m-%dT00:00:00.000Z")

          curl -fs --request POST \
            --url "${{ secrets.TITLE_EDITOR_URL }}/v2/softwaretitles/${{ secrets.VXT_TITLE_ID }}/patches" \
            --header "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            --header "Content-Type: application/json" \
            --data "{
              \"absoluteOrderId\": 0,
              \"enabled\": true,
              \"version\": \"${{ steps.latest.outputs.latest_version }}\",
              \"releaseDate\": \"$today\",
              \"standalone\": true,
              \"minimumOperatingSystem\": \"10.12\",
              \"reboot\": false,
              \"killApps\": {
                \"bundleId\": \"${{ secrets.VXT_BUNDLE_ID }}\",
                \"appName\": \"Vxt Desktop.app\"
              },
              \"components\": {
                \"name\": \"Vxt Desktop\",
                \"version\": \"${{ steps.latest.outputs.latest_version }}\",
                \"criteria\": {
                  \"absoluteOrderId\": 0,
                  \"and\": true,
                  \"name\": \"Application Bundle ID\",
                  \"operator\": \"is\",
                  \"value\": \"${{ secrets.VXT_BUNDLE_ID }}\",
                  \"type\": \"recon\"
                }
              },
              \"capabilities\": {
                \"absoluteOrderId\": 0,
                \"and\": true,
                \"name\": \"Application Bundle ID\",
                \"operator\": \"is\",
                \"value\": \"10.12\",
                \"type\": \"recon\"
              }
            }"

      - name: Get current software title
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        shell: bash
        run: |
          curl -fs --request GET \
            --url "${{ secrets.TITLE_EDITOR_URL }}/v2/softwaretitles/${{ secrets.VXT_TITLE_ID }}" \
            --header "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            --header "Content-Type: application/json" \
            > current_title.json

      - name: Update current version in Title Editor
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        shell: bash
        run: |
          jq '
            if has("currentVersion") then
              .currentVersion = "${{ steps.latest.outputs.latest_version }}"
            elif has("version") then
              .version = "${{ steps.latest.outputs.latest_version }}"
            else
              .
            end
          ' current_title.json > updated_title.json

          curl -fs --request PUT \
            --url "${{ secrets.TITLE_EDITOR_URL }}/v2/softwaretitles/${{ secrets.VXT_TITLE_ID }}" \
            --header "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            --header "Content-Type: application/json" \
            --data @updated_title.json

      - name: Update saved version
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        shell: bash
        run: |
          echo "${{ steps.latest.outputs.latest_version }}" > latest_version.txt

      - name: Commit updated version file
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_version.txt
          git commit -m "Update VXT version to ${{ steps.latest.outputs.latest_version }}"
          git push

      - name: Create issue for new version
        if: steps.latest.outputs.latest_version != steps.previous.outputs.previous_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh issue create \
            --title "New VXT version detected: ${{ steps.latest.outputs.latest_version }}" \
            --body $'A new VXT Desktop version was detected.\n\nPrevious version: ${{ steps.previous.outputs.previous_version }}\nNew version: ${{ steps.latest.outputs.latest_version }}\n\nDownload URL:\nhttps://storage.googleapis.com/vxt-app-desktop-versions/${{ steps.latest.outputs.latest_version }}/macUniversalDmg/Vxt%20Desktop-${{ steps.latest.outputs.latest_version }}-universal.dmg'
